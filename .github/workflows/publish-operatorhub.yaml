name: Publish to OperatorHub

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  IMAGE_TAG_BASE: quay.io/rh-mobb/ecr-secret-operator
  COMMUNITY_OPERATORS_PROD_REPO: redhat-openshift-ecosystem/community-operators-prod
  COMMUNITY_OPERATORS_REPO: k8s-operatorhub/community-operators

jobs:
  validate-secrets:
    name: Validate required secrets are set
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.QUAY_USERNAME }}"       ] && MISSING="${MISSING}\n  - QUAY_USERNAME"
          [ -z "${{ secrets.QUAY_PASSWORD }}"       ] && MISSING="${MISSING}\n  - QUAY_PASSWORD"
          [ -z "${{ secrets.OPERATORHUB_PR_TOKEN }}" ] && MISSING="${MISSING}\n  - OPERATORHUB_PR_TOKEN"
          if [ -n "${MISSING}" ]; then
            echo "❌ The following required secrets are not set:${MISSING}"
            echo ""
            echo "Configure them under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "✅ All required secrets are set"

  sync-forks:
    name: Sync community operator forks
    needs: validate-secrets
    uses: ./.github/workflows/sync-forks.yaml
    secrets: inherit

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: validate-secrets
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout operator repo
        uses: actions/checkout@v4

      - name: Parse version from release tag
        id: version
        # Strip the leading 'v' from the tag (e.g. v0.6.0 → 0.6.0)
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install operator-sdk
        run: |
          OPERATOR_SDK_VERSION=v1.42.0
          curl -sSLo /usr/local/bin/operator-sdk \
            "https://github.com/operator-framework/operator-sdk/releases/download/${OPERATOR_SDK_VERSION}/operator-sdk_linux_amd64"
          chmod +x /usr/local/bin/operator-sdk

      - name: Install kustomize and controller-gen
        run: make kustomize controller-gen

      - name: Install Podman
        run: |
          sudo apt-get update -y
          sudo apt-get install -y podman

      - name: Log in to Quay.io
        uses: redhat-actions/podman-login@v1
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push multi-arch operator image
        run: |
          make podman-build podman-push \
            IMG=${{ env.IMAGE_TAG_BASE }}:${{ github.ref_name }}

      - name: Stamp VERSION, containerImage, and createdAt into sources
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          TAG=${{ github.ref_name }}
          sed -i "s/^VERSION ?= .*/VERSION ?= ${VERSION}/" Makefile
          sed -i "s|containerImage: .*|containerImage: ${{ env.IMAGE_TAG_BASE }}:${TAG}|" \
            config/manifests/bases/ecr-secret-operator.clusterserviceversion.yaml
          sed -i "s|createdAt: .*|createdAt: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"|" \
            config/manifests/bases/ecr-secret-operator.clusterserviceversion.yaml

      - name: Generate OLM bundle
        run: make bundle IMG=${{ env.IMAGE_TAG_BASE }}:${{ github.ref_name }}

      - name: Restore com.redhat.openshift.versions annotation
        # make bundle regenerates annotations.yaml and drops custom annotations
        run: |
          if ! grep -q "com.redhat.openshift.versions" bundle/metadata/annotations.yaml; then
            sed -i '/operators.operatorframework.io.metrics.project_layout/a\  com.redhat.openshift.versions: "v4.16"' \
              bundle/metadata/annotations.yaml
          fi

      - name: Validate bundle
        run: |
          operator-sdk bundle validate ./bundle
          operator-sdk bundle validate ./bundle \
            --select-optional name=operatorhub
          operator-sdk bundle validate ./bundle \
            --select-optional name=good-practices

      - name: Build and push bundle image
        run: |
          make bundle-build bundle-push \
            BUNDLE_IMG=${{ env.IMAGE_TAG_BASE }}-bundle:${{ github.ref_name }}

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: bundle/

  # ------------------------------------------------------------------ #
  # community-operators-prod  (OpenShift OperatorHub — uses FBC)
  #
  # FBC process:
  #   1. Copy the bundle version directory (manifests + metadata)
  #   2. Add the new version entry to catalog-templates/basic.yaml
  #   3. Update release-config.yaml with the new replaces/skips graph
  #   The pipeline renders the actual catalogs from these templates.
  # ------------------------------------------------------------------ #
  publish-openshift-operatorhub:
    name: PR to community-operators-prod (FBC)
    runs-on: ubuntu-latest
    needs: [sync-forks, build-and-push]
    environment: operatorhub-publish

    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle
          path: bundle/

      - name: Checkout community-operators-prod upstream
        uses: actions/checkout@v4
        with:
          repository: redhat-openshift-ecosystem/community-operators-prod
          path: community-operators-prod
          token: ${{ secrets.OPERATORHUB_PR_TOKEN }}

      - name: Copy bundle version directory
        run: |
          VERSION=${{ needs.build-and-push.outputs.version }}
          DEST=community-operators-prod/operators/ecr-secret-operator/${VERSION}
          mkdir -p "${DEST}"
          cp -r bundle/manifests "${DEST}/"
          cp -r bundle/metadata  "${DEST}/"

      - name: Update catalog-templates/basic.yaml and release-config.yaml
        # Insert the new version entry into basic.yaml and update the upgrade graph
        # in release-config.yaml so that:
        #   - The new version replaces the previous latest (PREV_BUNDLE)
        #   - The version that PREV_BUNDLE was previously replacing moves into skips
        run: |
          VERSION=${{ needs.build-and-push.outputs.version }}
          TEMPLATE=community-operators-prod/operators/ecr-secret-operator/catalog-templates/basic.yaml
          RELEASE_CONFIG=community-operators-prod/operators/ecr-secret-operator/release-config.yaml

          # Extract the current latest bundle name from basic.yaml.
          # Entries look like:  "  - name: ecr-secret-operator.v0.4.1"
          # Use grep -o to capture only the matched token, avoiding field-splitting issues.
          PREV_BUNDLE=$(grep -o "ecr-secret-operator\.v[0-9][0-9.]*" "${TEMPLATE}" | head -1)

          if [ -z "${PREV_BUNDLE}" ]; then
            echo "ERROR: could not determine previous bundle from ${TEMPLATE}" >&2
            exit 1
          fi

          echo "Previous bundle: ${PREV_BUNDLE}"
          echo "New version:     ecr-secret-operator.v${VERSION}"

          # ---- Update basic.yaml ----------------------------------------
          # Strategy: parse with yaml (read-only) to collect bundle names, then
          # insert new lines directly — avoids round-tripping which would destroy
          # the base64 icon and other formatting in the file.
          python3 - <<PYEOF
          import yaml, sys

          TEMPLATE    = "${TEMPLATE}"
          NEW_BUNDLE  = "ecr-secret-operator.v${VERSION}"
          PREV_BUNDLE = "${PREV_BUNDLE}"

          with open(TEMPLATE) as f:
              lines = f.readlines()

          # Parse once to collect existing channel bundle names (skips list)
          doc = yaml.safe_load("".join(lines))
          existing_names = []
          for item in doc.get("entries", []):
              if isinstance(item, dict) and item.get("schema") == "olm.channel":
                  for e in item.get("entries", []):
                      if isinstance(e, dict) and "name" in e:
                          existing_names.append(e["name"])
                  break

          # skips = every previously published version except the immediate predecessor
          skips = sorted([n for n in existing_names if n != PREV_BUNDLE])

          # Find the first "- name: ecr-secret-operator.v" line in the file.
          # olm.bundle entries use "image:" not "name:", so this pattern only
          # appears inside the olm.channel entries block — no sentinel needed.
          insert_at = None
          indent = 2  # default
          for i, line in enumerate(lines):
              if "- name: ecr-secret-operator.v" in line:
                  insert_at = i
                  indent = len(line) - len(line.lstrip())
                  break

          if insert_at is None:
              print("ERROR: could not find channel bundle entries", file=sys.stderr)
              sys.exit(1)

          sp = " " * indent   # indentation of the "- name:" line itself
          # Layout (sp=2):
          #   {sp}- name: ...          e.g.  "  - name: ..."
          #   {sp}  replaces: ...            "    replaces: ..."
          #   {sp}  skips:                   "    skips:"
          #   {sp}    - item                 "      - item"   ← 2 more than skips:
          new_lines = [f"{sp}- name: {NEW_BUNDLE}\n",
                       f"{sp}  replaces: {PREV_BUNDLE}\n"]
          if skips:
              new_lines.append(f"{sp}  skips:\n")
              for s in skips:
                  new_lines.append(f"{sp}    - {s}\n")

          # Prepend: insert before the current first bundle entry
          result = lines[:insert_at] + new_lines + lines[insert_at:]
          with open(TEMPLATE, "w") as f:
              f.writelines(result)

          print(f"basic.yaml: inserted {NEW_BUNDLE} with {len(skips)} skips")
          PYEOF

          echo "--- basic.yaml (entries section) ---"
          grep -A25 "schema: olm.channel" "${TEMPLATE}" | head -30

          # ---- Update release-config.yaml --------------------------------
          # PREV_BUNDLE is the previous latest version.
          # The new release should *replace* PREV_BUNDLE.
          # Whatever PREV_BUNDLE was previously replacing moves into *skips*.
          python3 - <<PYEOF
          import yaml

          with open("${RELEASE_CONFIG}") as f:
              config = yaml.safe_load(f)

          tmpl = config["catalog_templates"][0]
          old_replaces = tmpl.get("replaces", "")  # what PREV_BUNDLE was replacing
          current_skips = tmpl.get("skips", [])

          # Cascade: the version that was previously being replaced moves into skips
          if old_replaces and old_replaces not in current_skips:
              current_skips.insert(0, old_replaces)

          # New release replaces the previous latest, not itself
          tmpl["replaces"] = "${PREV_BUNDLE}"
          # Guard: the new version should never appear in its own skips list
          tmpl["skips"] = [s for s in current_skips if s != "ecr-secret-operator.v${VERSION}"]

          with open("${RELEASE_CONFIG}", "w") as f:
              yaml.dump(config, f, default_flow_style=False, sort_keys=False)

          print("release-config.yaml updated")
          PYEOF

          echo "--- release-config.yaml ---"
          cat "${RELEASE_CONFIG}"

      - name: Push branch to fork and open PR
        env:
          GH_TOKEN: ${{ secrets.OPERATORHUB_PR_TOKEN }}
        run: |
          VERSION=${{ needs.build-and-push.outputs.version }}
          BRANCH=operators/ecr-secret-operator/${VERSION}

          cd community-operators-prod

          # Configure git identity
          git config user.name "rh-mobb-bot"
          git config user.email "rh-mobb-bot@users.noreply.github.com"

          # Stage and commit changes
          git checkout -b "${BRANCH}"
          git add operators/ecr-secret-operator/
          git commit -s -m "operator ecr-secret-operator (${VERSION})"

          # Push branch to fork
          git remote add fork \
            https://x-access-token:${{ secrets.OPERATORHUB_PR_TOKEN }}@github.com/rh-mobb/community-operators-prod.git
          git push fork "${BRANCH}"

          # Open PR against upstream using gh CLI
          gh pr create \
            --repo redhat-openshift-ecosystem/community-operators-prod \
            --head "rh-mobb:${BRANCH}" \
            --base main \
            --title "operator ecr-secret-operator (${VERSION})" \
            --body "Release \`${{ github.ref_name }}\` of [ecr-secret-operator](https://github.com/rh-mobb/ecr-secret-operator).

          See the [CHANGELOG](https://github.com/rh-mobb/ecr-secret-operator/blob/main/CHANGELOG.md) for details.

          ---
          *This PR was opened automatically by the [publish-operatorhub](https://github.com/rh-mobb/ecr-secret-operator/actions/workflows/publish-operatorhub.yaml) workflow.*"

  # ------------------------------------------------------------------ #
  # community-operators  (Public OperatorHub — uses semver bundle copy)
  #
  # Semver process: copy the bundle version directory, the pipeline
  # derives the upgrade graph automatically from version numbers.
  # ------------------------------------------------------------------ #
  publish-public-operatorhub:
    name: PR to community-operators (semver)
    runs-on: ubuntu-latest
    needs: [sync-forks, build-and-push]
    environment: operatorhub-publish

    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle
          path: bundle/

      - name: Checkout community-operators upstream
        uses: actions/checkout@v4
        with:
          repository: k8s-operatorhub/community-operators
          path: community-operators
          token: ${{ secrets.OPERATORHUB_PR_TOKEN }}

      - name: Copy bundle version directory
        run: |
          VERSION=${{ needs.build-and-push.outputs.version }}
          DEST=community-operators/operators/ecr-secret-operator/${VERSION}
          mkdir -p "${DEST}"
          cp -r bundle/manifests "${DEST}/"
          cp -r bundle/metadata  "${DEST}/"

          CI_YAML=community-operators/operators/ecr-secret-operator/ci.yaml
          if [ ! -f "${CI_YAML}" ]; then
            cat > "${CI_YAML}" <<'EOF'
          addReviewersToPR:
            enabled: false
          reviewers: []
          EOF
          fi

      - name: Push branch to fork and open PR
        env:
          GH_TOKEN: ${{ secrets.OPERATORHUB_PR_TOKEN }}
        run: |
          VERSION=${{ needs.build-and-push.outputs.version }}
          BRANCH=operators/ecr-secret-operator/${VERSION}

          cd community-operators

          # Configure git identity
          git config user.name "rh-mobb-bot"
          git config user.email "rh-mobb-bot@users.noreply.github.com"

          # Stage and commit changes
          git checkout -b "${BRANCH}"
          git add operators/ecr-secret-operator/
          git commit -s -m "operator ecr-secret-operator (${VERSION})"

          # Push branch to fork
          git remote add fork \
            https://x-access-token:${{ secrets.OPERATORHUB_PR_TOKEN }}@github.com/rh-mobb/community-operators.git
          git push fork "${BRANCH}"

          # Open PR against upstream using gh CLI
          gh pr create \
            --repo k8s-operatorhub/community-operators \
            --head "rh-mobb:${BRANCH}" \
            --base main \
            --title "operator ecr-secret-operator (${VERSION})" \
            --body "Release \`${{ github.ref_name }}\` of [ecr-secret-operator](https://github.com/rh-mobb/ecr-secret-operator).

          See the [CHANGELOG](https://github.com/rh-mobb/ecr-secret-operator/blob/main/CHANGELOG.md) for details.

          ---
          *This PR was opened automatically by the [publish-operatorhub](https://github.com/rh-mobb/ecr-secret-operator/actions/workflows/publish-operatorhub.yaml) workflow.*"
