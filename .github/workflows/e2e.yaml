name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to run against"
        required: true
        type: string
      command:
        description: "Command to run"
        required: true
        type: choice
        options:
          - run
          - debug
          - destroy
          - force-destroy
        default: run

permissions:
  contents: read
  pull-requests: read
  statuses: write
  id-token: write

env:
  IMAGE_TAG_BASE: quay.io/rh-mobb/ecr-secret-operator
  AWS_REGION: us-east-2
  CLUSTER_NAME_PREFIX: ecr-e2e

jobs:
  authorize:
    name: Check authorization
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check if actor is authorized
        env:
          ACTOR: ${{ github.actor }}
        run: |
          if ! grep -q "@${ACTOR}" CODEOWNERS 2>/dev/null; then
            echo "::error::User ${ACTOR} is not in CODEOWNERS"
            exit 1
          fi

  resolve-pr:
    name: Resolve PR metadata
    runs-on: ubuntu-latest
    needs: [authorize]
    outputs:
      pr_head_sha: ${{ steps.pr.outputs.head_sha }}
      labels: ${{ steps.pr.outputs.labels }}
    steps:
      - name: Look up PR head SHA and labels
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA=$(gh pr view "${{ inputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --json headRefOid --jq '.headRefOid')
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

          LABELS=$(gh pr view "${{ inputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | join(",")')
          echo "labels=${LABELS}" >> "$GITHUB_OUTPUT"

      - name: Set pending commit status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.head_sha }}" \
            -f state=pending \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="E2E tests are running (${{ inputs.command }})..." \
            -f context="E2E Tests"

  provision:
    name: Provision ROSA HCP cluster and ECR
    runs-on: ubuntu-latest
    needs: [resolve-pr]
    if: contains(fromJSON('["run","debug"]'), inputs.command)
    environment: e2e-test
    timeout-minutes: 60
    outputs:
      cluster_name: ${{ steps.tf-output.outputs.cluster_name }}
      cluster_api_url: ${{ steps.tf-output.outputs.cluster_api_url }}
      cluster_admin_password: ${{ steps.tf-output.outputs.cluster_admin_password }}
      ecr_registry: ${{ steps.tf-output.outputs.ecr_registry }}
      operator_ecr_role_arn: ${{ steps.tf-output.outputs.operator_ecr_role_arn }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve-pr.outputs.pr_head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::660250927410:role/ecr-secret-operator-e2e
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: test/e2e/terraform
        run: terraform init -backend-config="key=pr-${{ inputs.pr_number }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: test/e2e/terraform
        env:
          RHCS_CLIENT_ID: ${{ secrets.RHCS_CLIENT_ID }}
          RHCS_CLIENT_SECRET: ${{ secrets.RHCS_CLIENT_SECRET }}
        run: |
          terraform apply -auto-approve \
            -var="cluster_name=${{ env.CLUSTER_NAME_PREFIX }}-${{ inputs.pr_number }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="pr_number=${{ inputs.pr_number }}"

      - name: Extract Terraform outputs
        id: tf-output
        working-directory: test/e2e/terraform
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"
          echo "cluster_api_url=$(terraform output -raw cluster_api_url)" >> "$GITHUB_OUTPUT"
          echo "cluster_admin_password=$(terraform output -raw cluster_admin_password)" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=$(terraform output -raw ecr_registry_url)" >> "$GITHUB_OUTPUT"
          echo "operator_ecr_role_arn=$(terraform output -raw operator_ecr_role_arn)" >> "$GITHUB_OUTPUT"

  test:
    name: Run e2e tests
    runs-on: ubuntu-latest
    needs: [resolve-pr, provision]
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve-pr.outputs.pr_head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::660250927410:role/ecr-secret-operator-e2e
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CLI tools
        run: |
          curl -sSL https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz \
            | sudo tar xzf - -C /usr/local/bin oc kubectl

          OPERATOR_SDK_VERSION=v1.42.0
          curl -sSLo /usr/local/bin/operator-sdk \
            "https://github.com/operator-framework/operator-sdk/releases/download/${OPERATOR_SDK_VERSION}/operator-sdk_linux_amd64"
          chmod +x /usr/local/bin/operator-sdk

      - name: Log in to ROSA cluster
        run: |
          oc login "${{ needs.provision.outputs.cluster_api_url }}" \
            --username cluster-admin \
            --password "${{ needs.provision.outputs.cluster_admin_password }}" \
            --insecure-skip-tls-verify=true

      - name: Create operator namespace and AWS credentials
        run: |
          NAMESPACE="ecr-secret-operator"
          oc create namespace "${NAMESPACE}" --dry-run=client -o yaml | oc apply -f -

          # Create credentials file for STS role assumption via OIDC
          cat > /tmp/credentials <<EOF
          [default]
          role_arn = ${{ needs.provision.outputs.operator_ecr_role_arn }}
          web_identity_token_file = /var/run/secrets/openshift/serviceaccount/token
          EOF

          oc create secret generic aws-ecr-cloud-credentials \
            --namespace="${NAMESPACE}" \
            --from-file=credentials=/tmp/credentials \
            --dry-run=client -o yaml | oc apply -f -

      - name: Install operator via OLM bundle
        run: |
          operator-sdk run bundle \
            "${{ env.IMAGE_TAG_BASE }}-bundle:pr-${{ inputs.pr_number }}" \
            --namespace ecr-secret-operator \
            --timeout 10m

      - name: Wait for operator readiness
        run: |
          oc rollout status deployment/ecr-secret-operator-controller-manager \
            --namespace ecr-secret-operator \
            --timeout=300s

      - name: Run e2e test suite
        env:
          ECR_REGISTRY: ${{ needs.provision.outputs.ecr_registry }}
          TEST_NAMESPACE: ecr-secret-operator
          AWS_REGION: us-east-2
        run: test/e2e/scripts/run-e2e.sh

      - name: Collect debug logs on failure
        if: failure()
        run: |
          echo "=== Operator logs ==="
          oc logs deployment/ecr-secret-operator-controller-manager \
            --namespace ecr-secret-operator \
            --tail=200 || true
          echo "=== Events ==="
          oc get events --namespace ecr-secret-operator --sort-by='.lastTimestamp' || true
          echo "=== ECR Secret CRs ==="
          oc get secrets.ecr.mobb.redhat.com --all-namespaces -o yaml || true
          echo "=== ArgoHelmRepoSecret CRs ==="
          oc get argohelmreposecrets.ecr.mobb.redhat.com --all-namespaces -o yaml || true
          echo "=== Core secrets ==="
          oc get secrets --namespace ecr-secret-operator || true

      - name: Cleanup operator
        if: always()
        run: |
          operator-sdk cleanup ecr-secret-operator --namespace ecr-secret-operator || true

  destroy:
    name: Destroy infrastructure
    runs-on: ubuntu-latest
    needs: [resolve-pr, provision, test]
    if: >-
      always() &&
      inputs.command != 'debug' &&
      !(inputs.command == 'run' &&
        contains(needs.resolve-pr.outputs.labels, 'e2e-keep-infra'))
    environment: e2e-test
    timeout-minutes: 30
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve-pr.outputs.pr_head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::660250927410:role/ecr-secret-operator-e2e
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: test/e2e/terraform
        run: terraform init -backend-config="key=pr-${{ inputs.pr_number }}/terraform.tfstate"

      - name: Remove ROSA cluster and dependents from Terraform state
        if: inputs.command == 'force-destroy'
        working-directory: test/e2e/terraform
        run: |
          echo "Removing ROSA cluster and dependent resources from Terraform state..."
          # The IAM role and OIDC data source reference module.rosa_hcp outputs,
          # so they must be removed too — Terraform can't resolve those refs once
          # the module is gone from state.
          for resource in module.rosa_hcp aws_iam_role.operator_ecr aws_iam_role_policy.operator_ecr; do
            terraform state rm "$resource" 2>/dev/null \
              && echo "Removed $resource" \
              || echo "$resource not in state, skipping"
          done

      - name: Clean up orphaned IAM roles
        if: inputs.command == 'force-destroy'
        run: |
          ROLE_NAME="${{ env.CLUSTER_NAME_PREFIX }}-${{ inputs.pr_number }}-ecr-operator"
          echo "Deleting IAM role ${ROLE_NAME} (if it exists)..."
          aws iam delete-role-policy --role-name "$ROLE_NAME" --policy-name ecr-get-token 2>/dev/null || true
          aws iam delete-role --role-name "$ROLE_NAME" 2>/dev/null || true

      - name: Terraform Destroy
        working-directory: test/e2e/terraform
        env:
          RHCS_CLIENT_ID: ${{ secrets.RHCS_CLIENT_ID }}
          RHCS_CLIENT_SECRET: ${{ secrets.RHCS_CLIENT_SECRET }}
        run: |
          terraform destroy -auto-approve \
            -var="cluster_name=${{ env.CLUSTER_NAME_PREFIX }}-${{ inputs.pr_number }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="pr_number=${{ inputs.pr_number }}"

  report-status:
    name: Report PR status
    runs-on: ubuntu-latest
    needs: [authorize, resolve-pr, provision, test, destroy]
    if: always()
    steps:
      - name: Determine overall result
        id: result
        run: |
          if echo "${{ needs.provision.result }} ${{ needs.test.result }} ${{ needs.destroy.result }}" \
            | grep -qE 'failure|cancelled'; then
            echo "state=failure" >> "$GITHUB_OUTPUT"
            echo "description=E2E tests failed (${{ inputs.command }})" >> "$GITHUB_OUTPUT"
          else
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "description=E2E tests passed (${{ inputs.command }})" >> "$GITHUB_OUTPUT"
          fi

      - name: Update commit status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ needs.resolve-pr.outputs.pr_head_sha }}" \
            -f state="${{ steps.result.outputs.state }}" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="${{ steps.result.outputs.description }}" \
            -f context="E2E Tests"
